apiVersion: apps/v1
kind: Deployment
metadata:
  name: personal-website-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: personal-website-backend
  template:
    metadata:
      labels:
        app: personal-website-backend
    spec:
      containers:
        - name: backend
          image: personal-website-backend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: personal-website-backend
spec:
  type: NodePort
  selector:
    app: personal-website-backend
  ports:
    - port: 80
      targetPort: 8080