apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: personal-website-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Nor420/personal-website.git
    targetRevision: uat
    path: helm/personal-website-backend
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
