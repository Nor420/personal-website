replicaCount: 2

image:
  repository: asia-southeast1-docker.pkg.dev/personal-website-ron-9f777/backend/personal-website-backend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

env:
  NODE_ENV: production
  PORT: "8080"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

healthcheck:
  path: /health
  port: 8080
